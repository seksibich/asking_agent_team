services:
  stock-data-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: stock-data-service:latest
    container_name: stock-data-service
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "18901:18901"
    volumes:
      - ./cache:/app/cache        # tushare 缓存持久化
      - ./data:/app/data          # DB(SQLite)/回测数据等
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:18901/ready'); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
